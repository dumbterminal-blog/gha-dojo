# TODO: Give this workflow a name
name: Hello Charlie

# TODO: Set the trigger to run on 'push'
on: push

jobs:
  # TODO: Name this job 'greet'
  greet:
    # TODO: Run on ubuntu-latest
    runs-on: ubuntu-latest

    steps:
      # TODO: Add a step named "Say hello" that prints:
      #       Hello from the Actions Dojo!
      - name: Say hello
        run: echo "Hello from the Actions Dojo!"
      # EXTENSION: Say hello in non-default language e.g python
      - name: Python greeting
        run: print("Hello in Python")
        shell: python
      # TODO: Add a second step named "Show date" that runs the 'date' command
      - name: Show date
        run: date
