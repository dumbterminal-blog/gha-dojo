name: Reusable Setup

# TODO: Set the trigger to workflow_call
#       with an input 'node-version' (type: string, default: '20')
on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: '20'

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      # TODO: Print "Setting up Node <node-version>"
      - name: Show node version
        run: echo "Setting up Node ${{ inputs.node-version }}"
