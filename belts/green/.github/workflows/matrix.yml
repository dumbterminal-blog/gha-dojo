name: Matrix Build

on: push

jobs:
  test:
    # TODO: Set runs-on to use the matrix os value
    runs-on: ${{ matrix.os }}

    strategy:
      # TODO: Set fail-fast to false
      fail-fast: false

      matrix:
        # TODO: Define two dimensions:
        #   os: ubuntu-latest, windows-latest
        #   node: 18, 20
        os: 
          - ubuntu-latest
          - windows-latest
        node: 
          - 18
          - 20

        # TODO: Add an include that adds label: "LTS on Linux"
        #       only to the combination of ubuntu-latest + node 20
        include:
          - os: ubuntu-latest
            node: 20
            label: LTS on Linux

    steps:
      # TODO: Print "Testing on <os> with Node <node>"
      - name: Print matrix info
        run: echo "Testing on ${{ matrix.os }} with Node ${{ matrix.node }}"

      # TODO: Add a step that only runs when matrix.label is set
      #       and prints "Special combo: <label>"
      - name: Print label if set
        if: ${{ matrix.label != '' }}
        run: echo "Special combo":" ${{ matrix.label }}"
