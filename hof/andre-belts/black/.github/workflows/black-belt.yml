name: Black Belt Pipeline

on: push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # TODO: Add a caching step BEFORE npm install
      #   - uses: actions/cache@v4
      #   - cache path: ~/.npm
      #   - key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
      #   - restore-keys: npm-${{ runner.os }}-
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json')}}
          restore-keys: npm-${{ runner.os }}-

      # Install the action's dependencies
      - name: Install action dependencies
        working-directory: .github/actions/word-count
        run: npm install

      # TODO: Call the word-count action
      #   id: word-counter
      #   text: "The quick brown fox jumps over the lazy dog"
      - name: Count words
        id: word-counter
        uses: ./.github/actions/word-count
        with:
          text: "The quick brown fox jumps over the lazy dog"

      # TODO: Write "Word count: <count>" to report.txt
      #       using the word-counter step output
      - name: Write report
        run: echo "Word count":" ${{ steps.word-counter.outputs.count }}" > report.txt

      # TODO: Upload report.txt as an artefact called 'word-count-report'
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: my-artefact
          path: report.txt

  # ── review job ─────────────────────────────────────────────────────────────
  review:
    needs: build
    runs-on: ubuntu-latest

    steps:
      # TODO: Download the 'word-count-report' artefact
      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: my-artefact

      # TODO: Print the contents of report.txt
      - name: Show report
        run: cat report.txt
