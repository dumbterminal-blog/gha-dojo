name: Matrix Build

on: push

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [18, 20]
        include:
          - os: ubuntu-latest
            node: 20
            label: "LTS on Linux"

    steps:
      - name: Print matrix info
        run: echo "Testing on ${{ matrix.os }} with Node ${{ matrix.node }}"

      - name: Print label if set
        if: ${{ matrix.label != '' }}
        run: echo "Special combo: ${{ matrix.label }}"
